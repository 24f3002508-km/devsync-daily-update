name: Daily Repository Update

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Step by 24f3002508@ds.study.iitm.ac.in
        run: echo "Running scheduled update"

      - name: Make daily commit
        run: |
          echo "Last updated on $(date -u)" >> daily-log.txt
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add daily-log.txt
          git commit -m "Automated daily update $(date -u)" || echo "No changes to commit"
          git push
